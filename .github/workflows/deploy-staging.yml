name: Deploy to VPS staging

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'Dockerfile'
      - 'deploy/k8s/core/**'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/satriowicaksn/core-backend-api
  IMAGE_WORKER: ghcr.io/satriowicaksn/core-backend-worker

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: tags
        run: |
          echo "sha=main-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "date=main-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ steps.tags.outputs.sha }}
            ${{ env.IMAGE_API }}:${{ steps.tags.outputs.date }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:latest
            ${{ env.IMAGE_WORKER }}:${{ steps.tags.outputs.sha }}
            ${{ env.IMAGE_WORKER }}:${{ steps.tags.outputs.date }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Configure kubectl
        env:
          KUBECONFIG_B64: ${{ secrets.VPS_KUBECONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client=true

      - name: Run Prisma migration Job
        run: |
          kubectl -n core-staging delete job core-migrate --ignore-not-found=true
          kubectl apply -f deploy/k8s/core/job-migrate.yaml
          kubectl -n core-staging wait --for=condition=complete job/core-migrate --timeout=240s
          kubectl -n core-staging logs job/core-migrate

      - name: Apply manifests
        run: |
          kubectl apply -f deploy/k8s/core/namespace.yaml
          kubectl apply -f deploy/k8s/core/configmap.yaml
          kubectl apply -f deploy/k8s/core/service.yaml
          kubectl apply -f deploy/k8s/core/ingress.yaml

      - name: Roll api + worker to the new image
        env:
          SHA_TAG: ${{ steps.tags.outputs.sha }}
        run: |
          # Apply Deployment specs first so first-run bootstrap works
          # (set image would fail with NotFound before the Deployment exists).
          kubectl apply -f deploy/k8s/core/deployment.yaml

          kubectl -n core-staging set image \
            deployment/core-api \
            api="${IMAGE_API}:${SHA_TAG}"
          kubectl -n core-staging set image \
            deployment/core-worker \
            worker="${IMAGE_WORKER}:${SHA_TAG}"

          kubectl -n core-staging rollout status deployment/core-api --timeout=240s
          kubectl -n core-staging rollout status deployment/core-worker --timeout=240s

      - name: Smoke test (non-blocking until DNS resolves)
        continue-on-error: true
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS https://core-staging.sharedisini.com/healthz; then
              echo
              echo "Smoke test OK."
              exit 0
            fi
            echo "Waiting for healthz..."
            sleep 4
          done
          echo "Smoke test failed after 2 minutes (likely DNS still propagating)."
          exit 1
