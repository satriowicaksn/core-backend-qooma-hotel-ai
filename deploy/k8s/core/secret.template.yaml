# TEMPLATE — copy to `secret.staging.yaml` (gitignored) and fill in
# actual values before `kubectl apply`. Never commit real secrets.
#
# All values are UTF-8 strings; K8s will base64-encode them.
apiVersion: v1
kind: Secret
metadata:
  name: core-secrets
  namespace: core-staging
type: Opaque
stringData:
  # === Runtime datastores ===
  # Redis password WAJIB URL-encode (/, +, = → %2F, %2B, %3D).
  DATABASE_URL: 'postgresql://postgres:REPLACE_PG_PASSWORD@postgres-postgresql.data.svc.cluster.local:5432/core?schema=public'
  REDIS_URL: 'redis://:REPLACE_REDIS_PASSWORD_URL_ENCODED@redis-master.data.svc.cluster.local:6379'

  # === HTTP baseline ===
  API_BASE_URL: 'https://core-staging.sharedisini.com'
  CORS_ORIGIN: 'https://frontend-qooma-hotel-ai.vercel.app'

  # === Auth + crypto ===
  # openssl rand -base64 48   (min 32 char)
  JWT_ACCESS_SECRET: 'REPLACE_min_32_chars_from_openssl_rand_base64_48'
  JWT_REFRESH_SECRET: 'REPLACE_min_32_chars_from_openssl_rand_base64_48'
  # openssl rand -hex 32      (WAJIB tepat 64 hex char)
  ENCRYPTION_KEY: 'REPLACE_64_hex_chars_from_openssl_rand_hex_32'
